name: docker pull
on:
    workflow_dispatch:

jobs:
    pull-image:
        runs-on: ubuntu-latest

        steps:

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: pull flask image
              run: docker pull cshubham1727/flask-app