name: smart-pipeline

on:
    push:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: lint
              run: echo "lint job running"

    test:
        runs-on: ubuntu-latest

        steps:
            - name: test job
              run: echo "running test"

    summary:
        runs-on: ubuntu-latest
        needs: [lint,test]

        steps:
            - name: print branch name and commit message
              run: |
                echo "the branch name is: ${{github.ref_name}}"
                echo "the commit message is: ${{github.event.head_commit.message}}"
                
                
        