name: multi Job

on: 
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: print build
              run: echo "Building the app"


    test:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: print test
              run: echo "Testing the app"


    deploy:
        runs-on: ubuntu-latest
        needs: [build,test]

        steps:
            - name: print deploy
              run: echo "Deploying the app"





