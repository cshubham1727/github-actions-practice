# to run the job across multiple python versions. 
# Each job will install python and print the python version

name: matrix workflow

on:
  push:

jobs:
  install-python-and-print-python-version:
    runs-on: ubuntu-latest


    strategy:
      fail-fast: false
      matrix:
          python-version: ["3.10","3.11","3.12"]
          os: [ubuntu-latest, windows-latest]

          exclude:
            - os: windows-latest
            - python-version: 3.10

      steps:
        - name: set up python 
          uses: actions/setup-python@v5
          with:
          python-version: ${{ matrix.python-version }}

        - name: print python version
          run: python --version

