name: environment variables
env:
    APP_NAME: myapp

on:
    workflow_dispatch:

jobs:
    environment_variable:

        runs-on: ubuntu-latest

        env:    
            ENVIRONMENT: staging

        steps:
          - name: print variables
            env:
                VERSION: '1.0.0'
            run: |
               echo "My application name is: $APP_NAME"
               echo "Environment is: $ENVIRONMENT"
               echo "Version is: $VERSION"

            
            





