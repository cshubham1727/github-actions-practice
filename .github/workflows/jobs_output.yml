name: Job outputs

on:
    workflow_dispatch:

jobs:
    date:
        runs-on: ubuntu-latest

        outputs:
            date: ${{steps.current_date.outputs.todays_date}}

        steps:
            - name: current_date
              run: |
                echo "todays_date=Jun 23, 2026" >> "$GITHUB_OUTPUT"
                
                
    
    print_date:
        runs-on: ubuntu-latest
        needs: date

        steps:
            - name: print date
              run: |
                echo "Todays date is: ${{ needs.date.outputs.date}}"





