on:
  push

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print hello
        run: echo "Hello from GitHub Actions!"

      - name: print current date and time
        run: date

      - name: branch that triggered run
        run: echo ${{ github.ref_name  }}

      - name: list all files in repo
        run: git ls-files

      - name: runner OS
        run: ${{ runner.os }}
