name: artifacts upload

on:
    workflow_dispatch:

jobs:
    artifacts_upload:
        runs-on: ubuntu-latest

        steps:
                
            - name: create a file
              run: |
                mkdir reports 
                echo "Important logs" > reports/logs.txt

            - name: upload logs
              uses: actions/upload-artifact@v4
              with:
                   name: test-reports
                   path: reports/logs.txt

                
    artifacts-download:
        runs-on: ubuntu-latest
        needs: artifacts_upload

        steps:
            - name: download artifacts
              uses: actions/download-artifact@v4
              with:
                name: test-reports
                path: reports/

            - name: verify downloaded file
              run: cat reports/logs.txt


      
