name: artifacts upload

on:
    workflow_dispatch:

jobs:
    artifacts_upload:
        runs-on: ubuntu-latest

        steps:
                
            - name: create a file
              run: |
                mkdir reports 
                echo "logs" > reports/logs.txt

            - name: upload logs
              uses: actions/upload-artifact@v4
              with:
                   name: upload reports
                   path: reports/logs.txt
                  
