name: call build

on:
    # push:
    #     branches:
    #         - main

    workflow_dispatch:

jobs:
    call-build:
        uses: ./.github/workflows/reusable-build.yml
        with:
            app_name: "my-web-app"
            environment: "production"

        secrets:
            docker_token: ${{ secrets.DOCKERHUB_TOKEN }}


    version:
        runs-on: ubuntu-latest
        needs: call-build

        steps:
            - name: read and print build version 
              run: |
                echo "The build version is ${{ needs.call-build.outputs.build_version }}"
