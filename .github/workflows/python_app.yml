name: Run Python app

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Specify your required version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: run the script
        run: python app.py 
